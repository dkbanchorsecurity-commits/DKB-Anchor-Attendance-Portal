<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guard Portal - DKB Anchor Security</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A2540">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" id="app-favicon" href="logo">

    <!-- Standard Favicon tags -->
    <link rel="icon" type="image/png" id="app-favicon" href="logo.png">
    <link rel="shortcut icon" href="logo.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-bg: #0A2540;
            --accent-gold: #D4AF37;
            --danger-red: #E53E3E;
            --success-green: #38A169;
            --light-gray: #F4F6F8;
            --text-dark: #333;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--primary-bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; -webkit-tap-highlight-color: transparent;}
        
        .login-box { background: #ffffff; color: var(--text-dark); padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 420px; text-align: center; position: relative; overflow: hidden; }

        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #E2E8F0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; font-family: inherit; }
        input[id="guardId"], input[id="obsGuardId"], input[id="incGuardId"], input[id="broadSenderId"] { text-align: center; text-transform: uppercase; font-weight: bold; }

        .btn { width: 100%; padding: 15px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; margin-bottom: 10px; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; touch-action: manipulation;}
        .btn-in { background-color: var(--success-green); }
        .btn-out { background-color: var(--danger-red); }
        .btn-obs { background-color: var(--primary-bg); }
        .btn-inc { background-color: var(--danger-red); }
        .btn-camera { background-color: var(--accent-gold); color: var(--primary-bg); padding: 10px; font-size: 1rem;}

        #stop-alarm-btn { display: none; background-color: #ff0000; animation: alarmPulse 0.5s infinite; margin-top: 10px; z-index: 100; border: 3px solid white; height: 60px; }
        @keyframes alarmPulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #camera-container { margin: 10px 0; background: var(--light-gray); padding: 8px; border-radius: 8px; border: 2px dashed #CBD5E0;}
        video, #photo-preview { width: 100%; border-radius: 6px; display: none; margin-bottom: 10px; object-fit: cover; }

        .tabs { display: flex; margin-bottom: 15px; border-radius: 10px; overflow: hidden; border: 2px solid var(--primary-bg); }
        .tab-btn { position: relative; flex: 1; padding: 12px 2px; border: none; background: var(--light-gray); color: var(--primary-bg); font-weight: bold; font-size: 0.7rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px;}
        .tab-btn i { font-size: 1rem; }
        .tab-btn.active { background: var(--primary-bg); color: var(--accent-gold); }
        
        .msg-badge { position: absolute; top: 4px; right: 6px; background: var(--danger-red); color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; display: none; }

        .form-section { display: none; animation: fadeIn 0.3s ease; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .msg-list { max-height: 350px; overflow-y: auto; text-align: left; }
        .msg-card { background: var(--light-gray); border-left: 5px solid var(--accent-gold); padding: 12px; margin-bottom: 8px; border-radius: 6px; cursor: pointer;}
        
        #msg-reader { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 200; padding: 20px; box-sizing: border-box; text-align: left; overflow-y: auto; }
        .reader-close { background: #E2E8F0; color: var(--primary-bg); border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .status-msg { font-weight: bold; margin-top: 10px; min-height: 24px; font-size: 0.9rem; transition: opacity 0.3s;}
    </style>
</head>
<body onclick="unlockAudio()" ontouchstart="unlockAudio()">
    <div class="login-box">
        <!-- DKB Anchor Branding -->
        <img id="portalLogo" src="logo.png" alt="DKB Anchor Security Logo" style="max-height: 60px; margin-bottom: 5px; border-radius: 4px;">
        <h2 style="font-size: 1.4rem; color: var(--primary-bg); margin: 0; text-transform: uppercase;">DKB Anchor Security</h2>
        <p style="margin: 2px 0 10px 0; font-size: 0.9rem; font-weight: bold; color: var(--accent-gold); letter-spacing: 1px;">SERVICES LTD</p>
        <div style="background: var(--primary-bg); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; display: inline-block; margin-bottom: 15px;">Guard Portal</div>
        
        <div id="camera-container">
            <video id="camera-feed" autoplay playsinline muted></video>
            <img id="photo-preview" alt="Captured Photo">
            <div style="display: flex; gap: 8px;">
                <button id="start-camera-btn" class="btn btn-camera" onclick="startCamera()"><i class="fa-solid fa-camera"></i> Open Camera</button>
                <button id="flip-camera-btn" class="btn btn-camera" style="display:none;" onclick="toggleCamera()"><i class="fa-solid fa-rotate"></i> Flip</button>
            </div>
            <button id="take-photo-btn" class="btn btn-camera" style="display:none;" onclick="takePhoto()"><i class="fa-solid fa-circle-check"></i> Capture Photo</button>
            <input type="hidden" id="photo-data">
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-attendance" onclick="switchTab('attendance')"><i class="fa-solid fa-user-clock"></i> Time</button>
            <button class="tab-btn" id="tab-observation" onclick="switchTab('observation')"><i class="fa-solid fa-binoculars"></i> Observe</button>
            <button class="tab-btn" id="tab-incident" onclick="switchTab('incident')"><i class="fa-solid fa-triangle-exclamation"></i> Alert</button>
            <button class="tab-btn" id="tab-broadcast" onclick="switchTab('broadcast')"><i class="fa-solid fa-bullhorn"></i> Broadcast</button>
            <button class="tab-btn" id="tab-messages" onclick="switchTab('messages')">
                <i class="fa-solid fa-envelope"></i> Msgs
                <span id="guardMsgBadge" class="msg-badge">0</span>
            </button>
        </div>

        <button id="stop-alarm-btn" class="btn" onclick="silenceAlarm()"><i class="fa-solid fa-volume-xmark"></i> STOP LOUD ALARM</button>

        <!-- Time & Attendance -->
        <div id="section-attendance" class="form-section active">
            <input type="text" id="guardId" placeholder="Guard ID (DKB-XXX)">
            <button class="btn btn-in" onclick="logAttendance('in')">CLOCK IN</button>
            <button class="btn btn-out" onclick="logAttendance('out')">CLOCK OUT</button>
            <div id="status-attendance" class="status-msg"></div>
        </div>

        <!-- Observations -->
        <div id="section-observation" class="form-section">
            <input type="text" id="obsGuardId" placeholder="Your Guard ID">
            <input type="text" id="obsSite" placeholder="Site / Location">
            <textarea id="obsDesc" rows="3" placeholder="Observation details..."></textarea>
            <button class="btn btn-obs" onclick="logObservation()">SUBMIT</button>
            <div id="status-observation" class="status-msg"></div>
        </div>

        <!-- Incidents -->
        <div id="section-incident" class="form-section">
            <input type="text" id="incGuardId" placeholder="Your Guard ID">
            <input type="text" id="incLocation" placeholder="Site / Location">
            <select id="incCategory">
                <option value="" disabled selected>Incident Type</option>
                <option value="Theft">Theft</option>
                <option value="Intrusion">Intrusion</option>
                <option value="Fire">Fire Hazard</option>
            </select>
            <textarea id="incDesc" rows="3" placeholder="Describe incident..."></textarea>
            <button class="btn btn-inc" onclick="logIncidentGuard()">ALERT INCIDENT</button>
            <div id="status-incident" class="status-msg"></div>
        </div>

        <!-- Broadcast Messages -->
        <div id="section-broadcast" class="form-section">
            <input type="text" id="broadSenderId" placeholder="Your Guard ID">
            <select id="broadRecipient">
                <option value="" disabled selected>Select Recipient</option>
                <option value="All Guards">All Guards</option>
                <option value="HQ">HQ</option>
            </select>
            <input type="text" id="broadSubject" placeholder="Subject (e.g., Gate 3 Update)">
            <textarea id="broadBody" rows="3" placeholder="Type your broadcast message..."></textarea>
            <button class="btn btn-obs" onclick="sendBroadcast()"><i class="fa-solid fa-paper-plane"></i> SEND BROADCAST</button>
            <div id="status-broadcast" class="status-msg"></div>
        </div>

        <!-- Message Reader -->
        <div id="section-messages" class="form-section">
            <div id="msg-list-container" class="msg-list"></div>
        </div>

        <div id="msg-reader">
            <button class="reader-close" onclick="closeMessage()">Back</button>
            <h3 id="read-subject"></h3>
            <p id="read-date" style="font-size: 0.8rem; color: #718096; border-bottom: 1px solid #E2E8F0; padding-bottom: 10px;"></p>
            <div id="read-body" style="color: #333; line-height: 1.5; white-space: pre-wrap;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, doc, setDoc, getDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7cUX5DXzGhktfRItpdXJ45TrYH9KlVm4",
            authDomain: "dkb-anchor-management-system.firebaseapp.com",
            projectId: "dkb-anchor-management-system",
            storageBucket: "dkb-anchor-management-system.firebasestorage.app",
            messagingSenderId: "424257722432",
            appId: "1:424257722432:web:2f8c1a1cc7a69df4b0a7a5"
        };

        const app = initializeApp(firebaseConfig);
        const firestore = initializeFirestore(app, { localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }) });

        // --- AUDIO ENGINE ---
        const siren = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
        siren.loop = true;
        let alarmTimer = null;
        let audioUnlocked = false;

        window.unlockAudio = () => {
            if (audioUnlocked) return;
            siren.play().then(() => { siren.pause(); siren.currentTime = 0; audioUnlocked = true; }).catch(e => {});
        };

        window.silenceAlarm = () => { 
            siren.pause(); siren.currentTime = 0; 
            if ("vibrate" in navigator) navigator.vibrate(0);
            document.getElementById('stop-alarm-btn').style.display = 'none'; 
            if(alarmTimer) clearTimeout(alarmTimer);
        };

        // --- MASTER RESET ---
        window.resetPortal = (statusId, successMessage) => {
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            const video = document.getElementById('camera-feed');
            video.srcObject = null; video.style.display = "none";
            document.getElementById('photo-preview').style.display = "none";
            document.getElementById('photo-preview').src = "";
            document.getElementById('photo-data').value = "";
            document.getElementById('take-photo-btn').style.display = "none";
            document.getElementById('flip-camera-btn').style.display = "none";
            document.getElementById('start-camera-btn').style.display = "flex";
            document.getElementById('start-camera-btn').innerHTML = '<i class="fa-solid fa-camera"></i> Open Camera';

            // Clear all text inputs across tabs
            ['guardId', 'obsGuardId', 'obsSite', 'obsDesc', 'incGuardId', 'incLocation', 'incDesc', 'broadSenderId', 'broadSubject', 'broadBody'].forEach(id => document.getElementById(id).value = "");
            
            // Reset Dropdowns
            document.getElementById('incCategory').selectedIndex = 0;
            document.getElementById('broadRecipient').selectedIndex = 0;

            if (statusId && successMessage) {
                const statusDiv = document.getElementById(statusId);
                statusDiv.style.opacity = 1;
                statusDiv.style.color = "var(--success-green)";
                statusDiv.innerText = successMessage;
                setTimeout(() => { 
                    statusDiv.style.opacity = 0;
                    setTimeout(() => { statusDiv.innerText = ""; }, 300);
                }, 5000);
            }
        };

        // --- CAMERA LOGIC ---
        let stream = null;
        let currentFacingMode = "environment";

        window.startCamera = async () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
                const video = document.getElementById('camera-feed');
                video.srcObject = stream; video.style.display = "block";
                video.style.transform = (currentFacingMode === "user") ? "scaleX(-1)" : "scaleX(1)";
                document.getElementById('photo-preview').style.display = "none";
                document.getElementById('start-camera-btn').style.display = "none";
                document.getElementById('take-photo-btn').style.display = "flex";
                document.getElementById('flip-camera-btn').style.display = "flex";
            } catch (e) { alert("Please allow camera access in your device settings."); }
        };

        window.toggleCamera = () => { currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment"; window.startCamera(); };

        window.takePhoto = () => {
            const video = document.getElementById('camera-feed');
            const canvas = document.createElement('canvas');
            canvas.width = 320; canvas.height = 240;
            const ctx = canvas.getContext('2d');
            if (currentFacingMode === "user") { ctx.translate(320, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0, 320, 240);
            document.getElementById('photo-data').value = canvas.toDataURL('image/jpeg', 0.6);
            document.getElementById('photo-preview').src = document.getElementById('photo-data').value;
            document.getElementById('photo-preview').style.display = "block";
            document.getElementById('photo-preview').style.transform = (currentFacingMode === "user") ? "scaleX(-1)" : "scaleX(1)";
            
            if (stream) stream.getTracks().forEach(t => t.stop()); 
            video.srcObject = null; video.style.display = "none";
            document.getElementById('take-photo-btn').style.display = "none";
            document.getElementById('flip-camera-btn').style.display = "none";
            document.getElementById('start-camera-btn').style.display = "flex";
            document.getElementById('start-camera-btn').innerHTML = '<i class="fa-solid fa-camera"></i> Retake Photo';
        };

        // --- HARDWARE BACK BUTTON LOGIC (HISTORY API) ---
        let previousMsgCount = -1, unreadBadgeCount = 0;

        window.addEventListener('DOMContentLoaded', () => {
            history.replaceState({ tab: 'attendance' }, '', '#attendance');
            loadBranding();
        });

        window.addEventListener('popstate', (event) => {
            if (event.state) {
                if (event.state.view === 'message') {
                    window.openMessage(event.state.id, true);
                } else if (event.state.tab) {
                    document.getElementById('msg-reader').style.display = 'none';
                    window.switchTab(event.state.tab, true);
                }
            } else {
                document.getElementById('msg-reader').style.display = 'none';
                window.switchTab('attendance', true);
            }
        });

        window.switchTab = (tabName, fromHistory = false) => {
            // Updated to include broadcast tab
            ['attendance', 'observation', 'incident', 'broadcast', 'messages'].forEach(n => {
                document.getElementById('section-' + n).classList.remove('active');
                document.getElementById('tab-' + n).classList.remove('active');
            });
            document.getElementById('section-' + tabName).classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
            
            if(tabName === 'messages') { 
                unreadBadgeCount = 0; document.getElementById('guardMsgBadge').style.display = 'none'; 
                document.getElementById('camera-container').style.display = 'none';
                window.silenceAlarm(); 
            } else { 
                document.getElementById('camera-container').style.display = 'block'; 
            }

            if (!fromHistory) {
                history.pushState({ tab: tabName }, '', '#' + tabName);
            }
            document.getElementById('msg-reader').style.display = 'none';
        };

        window.openMessage = (id, fromHistory = false) => {
            const m = cached[id];
            if(!m) return;
            document.getElementById('read-subject').innerText = m.subject;
            document.getElementById('read-date').innerText = new Date(m.timestamp).toLocaleString();
            document.getElementById('read-body').innerText = m.body;
            document.getElementById('msg-reader').style.display = 'block';
            window.silenceAlarm();

            if (!fromHistory) {
                history.pushState({ view: 'message', id: id }, '', '#msg-' + id);
            }
        };

        window.closeMessage = () => { history.back(); };

        // --- DATA SYNC ---
        window.logAttendance = async (type) => {
            const id = document.getElementById('guardId').value.trim().toUpperCase();
            const photo = document.getElementById('photo-data').value;
            const statusDiv = document.getElementById('status-attendance');

            statusDiv.style.opacity = 1;
            
            if(!id) {
                statusDiv.style.color = "var(--danger-red)"; statusDiv.innerText = "Error: Please enter a Guard ID."; return;
            }
            if(!id.startsWith("DKB-")) {
                statusDiv.style.color = "var(--danger-red)"; statusDiv.innerText = "Error: Guard ID must start with 'DKB-'."; return;
            }
            if(!photo) {
                statusDiv.style.color = "var(--danger-red)"; statusDiv.innerText = "Error: You must capture a photo first."; return;
            }
            
            statusDiv.innerText = "Syncing...";
            statusDiv.style.color = "var(--primary-bg)";
            
            const date = new Date().toISOString().split('T')[0];
            const timeStr = new Date().toLocaleTimeString();
            
            try {
                await setDoc(doc(firestore, "attendance", `${id}_${date}`), {
                    id: `${id}_${date}`, empId: id, date,
                    [type === 'in' ? 'clockIn' : 'clockOut']: timeStr,
                    [type === 'in' ? 'photoIn' : 'photoOut']: photo
                }, { merge: true });
                
                window.resetPortal('status-attendance', `Success: Clocked ${type.toUpperCase()} at ${timeStr}`);
            } catch (error) {
                console.error(error);
                window.resetPortal('status-attendance', `Saved Offline: Clocked ${type.toUpperCase()} at ${timeStr}`);
            }
        };

        window.logObservation = async () => {
            const statusDiv = document.getElementById('status-observation');
            statusDiv.style.opacity = 1;

            const guardId = document.getElementById('obsGuardId').value.trim().toUpperCase();
            const site = document.getElementById('obsSite').value.trim();
            const desc = document.getElementById('obsDesc').value.trim();
            const photo = document.getElementById('photo-data').value || null;

            if (!guardId || !site || !desc) {
                statusDiv.style.color = "var(--danger-red)";
                statusDiv.innerText = "Error: Please fill in all text fields.";
                return;
            }

            statusDiv.innerText = "Syncing...";
            statusDiv.style.color = "var(--primary-bg)";

            const id = "OBS-" + Date.now().toString().slice(-6);
            
            try {
                await setDoc(doc(firestore, "observations", id), {
                    id, site, observer: guardId, description: desc, photo,
                    status: "Pending Review", timestamp: Date.now(), date: new Date().toISOString()
                });
                window.resetPortal('status-observation', "Observation Uploaded Successfully.");
            } catch (error) {
                console.error(error);
                window.resetPortal('status-observation', "Saved Offline: Observation Logged.");
            }
        };

        window.logIncidentGuard = async () => {
            const statusDiv = document.getElementById('status-incident');
            statusDiv.style.opacity = 1;

            const guardId = document.getElementById('incGuardId').value.trim().toUpperCase();
            const location = document.getElementById('incLocation').value.trim();
            const category = document.getElementById('incCategory').value;
            const desc = document.getElementById('incDesc').value.trim();
            const photo = document.getElementById('photo-data').value || null;

            if (!guardId || !location || !category || !desc) {
                statusDiv.style.color = "var(--danger-red)";
                statusDiv.innerText = "Error: Please fill out all incident details.";
                return;
            }

            statusDiv.innerText = "Alerting HQ...";
            statusDiv.style.color = "var(--primary-bg)";

            const id = "INC-" + Date.now().toString().slice(-6);
            
            try {
                await setDoc(doc(firestore, "incidents", id), {
                    id, location, category, reporter: guardId, description: desc, photo,
                    status: "Pending", timestamp: Date.now(), date: new Date().toISOString()
                });
                window.resetPortal('status-incident', "CRITICAL ALERT SENT TO HQ.");
            } catch (error) {
                console.error(error);
                window.resetPortal('status-incident', "Saved Offline: Will alert HQ when signal returns.");
            }
        };

        // --- NEW: SEND BROADCAST ---
        window.sendBroadcast = async () => {
            const statusDiv = document.getElementById('status-broadcast');
            statusDiv.style.opacity = 1;

            const sender = document.getElementById('broadSenderId').value.trim().toUpperCase();
            const recipient = document.getElementById('broadRecipient').value;
            const subject = document.getElementById('broadSubject').value.trim();
            const body = document.getElementById('broadBody').value.trim();

            if (!sender || !recipient || !subject || !body) {
                statusDiv.style.color = "var(--danger-red)";
                statusDiv.innerText = "Error: Please fill out all fields.";
                return;
            }

            statusDiv.innerText = "Sending Broadcast...";
            statusDiv.style.color = "var(--primary-bg)";

            const id = "MSG-" + Date.now().toString().slice(-6);
            
            try {
                await setDoc(doc(firestore, "messages", id), {
                    id, 
                    sender, 
                    recipient, 
                    subject, 
                    body,
                    timestamp: Date.now(), 
                    date: new Date().toISOString()
                });
                window.resetPortal('status-broadcast', "Broadcast Sent Successfully.");
            } catch (error) {
                console.error(error);
                window.resetPortal('status-broadcast', "Saved Offline: Will send when signal returns.");
            }
        };

        // --- MESSAGE LISTENER ---
        let cached = {};
        onSnapshot(query(collection(firestore, "messages"), orderBy("timestamp", "desc")), (snap) => {
            const container = document.getElementById("msg-list-container"); container.innerHTML = "";
            let count = 0;
            snap.forEach(d => {
                const m = d.data();
                if(m.recipient.includes("Guards") || m.recipient.includes("Employees") || m.recipient === "All Guards") {
                    count++; cached[d.id] = m;
                    container.innerHTML += `<div class="msg-card" onclick="openMessage('${d.id}')"><strong>${m.subject}</strong><br><small style="color:#666;">From: ${m.sender || 'Admin'}</small></div>`;
                }
            });
            if(previousMsgCount !== -1 && count > previousMsgCount) {
                unreadBadgeCount += (count - previousMsgCount);
                document.getElementById('guardMsgBadge').innerText = unreadBadgeCount;
                document.getElementById('guardMsgBadge').style.display = 'block';
                document.getElementById('stop-alarm-btn').style.display = 'flex';
                
                siren.play().catch(e => {});
                if ("vibrate" in navigator) navigator.vibrate([1000, 500, 1000, 500, 1000, 500, 1000, 500, 1000, 500]);
                if(alarmTimer) clearTimeout(alarmTimer);
                alarmTimer = setTimeout(window.silenceAlarm, 10000);
            }
            previousMsgCount = count;
        });

        // --- BRANDING SYNC ---
        async function loadBranding() {
            try {
                const docSnap = await getDoc(doc(firestore, "settings", "system"));
                if (docSnap.exists() && docSnap.data().logo) {
                    document.getElementById("portalLogo").src = docSnap.data().logo;
                    document.getElementById("app-favicon").href = docSnap.data().logo;
                }
            } catch (e) {
                // Ignore load failure, let local placeholder render
            }
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }
    </script>
</body>
</html>
